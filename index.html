<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ספריית נכסים</title>
  <!-- ⚠️ QUALITY-CRITICAL: must be lib/1/ (latest), NOT lib/1.1/. The old build does
       not expose addImage/addAudioFromBase64 → insert breaks + SVG/quality degrade.
       Do NOT change this line during UI/refactor work. See CLAUDE.md gotchas. -->
  <script src="https://appsforoffice.microsoft.com/lib/1/hosted/office.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Hebrew:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --primary: #0078d4;
      --primary-dark: #005fa3;
      --fg: #0f172a;
      --fg-2: #4b5563;
      --fg-3: #9ca3af;
      --bg: #f1f5f9;
      --surface: #ffffff;
      --border: #e2e8f0;
      --primary-fg: #ffffff;
      --radius: 10px;
      --t: 140ms ease;
    }

    body {
      font-family: 'Noto Sans Hebrew', 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      font-size: 13px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ─────────────────────────────────────── */
    .hdr {
      background: linear-gradient(135deg, #1488e6 0%, var(--primary) 52%, var(--primary-dark) 100%);
      color: #fff;
      padding: 13px 13px 11px;
      flex-shrink: 0;
      box-shadow: 0 1px 0 rgba(0,0,0,.04);
    }

    .hdr h1 {
      font-size: 14.5px;
      font-weight: 600;
      margin-bottom: 10px;
      letter-spacing: -0.2px;
      display: flex;
      align-items: center;
      gap: 7px;
    }

    .hdr h1 svg { opacity: .92; }

    .search-wrap {
      display: flex;
      align-items: center;
      background: rgba(255, 255, 255, 0.14);
      border: 1px solid rgba(255, 255, 255, 0.22);
      border-radius: 6px;
      padding: 6px 9px;
      gap: 7px;
      transition: background var(--t), border-color var(--t);
    }

    .search-wrap:focus-within {
      background: rgba(255, 255, 255, 0.22);
      border-color: rgba(255, 255, 255, 0.55);
    }

    .search-icon { display: flex; align-items: center; opacity: 0.75; flex-shrink: 0; }

    .search-wrap input {
      flex: 1;
      background: none;
      border: none;
      outline: none;
      color: #fff;
      font: inherit;
      font-size: 12.5px;
    }

    .search-wrap input::placeholder { color: rgba(255, 255, 255, 0.58); }

    .count {
      font-size: 11px;
      color: rgba(255, 255, 255, 0.72);
      margin-top: 7px;
      min-height: 14px;
    }

    .hint {
      font-size: 10.5px;
      color: rgba(255, 255, 255, 0.62);
      margin-top: 2px;
    }

    /* ── Tabs (segmented pills) ──────────────────────── */
    .tabs {
      display: flex;
      gap: 6px;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      overflow-x: auto;
      scrollbar-width: none;
      flex-shrink: 0;
      padding: 9px 10px;
    }

    .tabs::-webkit-scrollbar { display: none; }

    .tab {
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 500;
      color: var(--fg-2);
      background: var(--bg);
      border: 1px solid transparent;
      border-radius: 999px;
      cursor: pointer;
      white-space: nowrap;
      user-select: none;
      flex-shrink: 0;
      outline: none;
      transition: background var(--t), color var(--t), box-shadow var(--t);
    }

    .tab:hover { color: var(--fg); background: #e9eef5; }

    .tab:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 1px;
    }

    .tab.on {
      color: var(--primary-fg, #fff);
      background: var(--primary);
      font-weight: 600;
      box-shadow: 0 1px 4px rgba(0, 120, 212, 0.32);
    }

    /* ── Status bar ──────────────────────────────────── */
    #st {
      display: none;
      padding: 8px 11px;
      font-size: 12px;
      flex-shrink: 0;
      border-bottom: 1px solid transparent;
      line-height: 1.45;
    }

    #st.ok  { display: block; background: #f0fdf4; color: #15803d; border-color: #bbf7d0; }
    #st.err { display: block; background: #fef2f2; color: #dc2626; border-color: #fecaca; }
    #st.inf { display: block; background: #eff6ff; color: #1d4ed8; border-color: #bfdbfe; }

    /* ── Scrollable body ─────────────────────────────── */
    #body {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
    }

    #body::-webkit-scrollbar { width: 4px; }
    #body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

    /* ── Grid ────────────────────────────────────────── */
    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 8px;
      animation: grid-in 0.28s ease both;
    }

    @keyframes grid-in {
      from { opacity: 0; transform: translateY(4px); }
      to   { opacity: 1; transform: none; }
    }

    /* ── Card ────────────────────────────────────────── */
    .card {
      border: 1px solid var(--border);
      border-radius: var(--radius);
      overflow: hidden;
      cursor: grab;
      background: var(--surface);
      outline: none;
      transition: box-shadow var(--t), border-color var(--t), transform var(--t);
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }

    .card:active { cursor: grabbing; }

    /* Suppress the IMG's own (thumbnail) drag so the CARD-level high-quality drag fires. */
    .card img, .thumb img { -webkit-user-drag: none; user-drag: none; }

    .card:hover {
      box-shadow: 0 6px 20px rgba(15, 23, 42, 0.10), 0 1px 3px rgba(15, 23, 42, 0.06);
      border-color: #cbd5e1;
    }

    .card:hover .thumb img.vis { transform: scale(1.05); }

    .card:active { opacity: 0.82; transform: scale(0.985); transition-duration: 60ms; }

    .card:focus-visible {
      outline: 2px solid var(--primary);
      outline-offset: 1px;
    }

    .card.ins { animation: ins-flash 0.5s ease; }

    @keyframes ins-flash {
      0%, 100% { background: var(--surface); border-color: var(--border); }
      40%       { background: #dcfce7; border-color: #86efac; }
    }

    /* Thumbnail */
    .thumb {
      width: 100%;
      aspect-ratio: 4 / 3;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
    }

    .thumb img {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 0.22s, transform var(--t);
    }

    .thumb img.vis { opacity: 1; }

    .ske {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, #f1f5f9 25%, #e2e8f0 50%, #f1f5f9 75%);
      background-size: 200% 100%;
      animation: ske 1.4s infinite;
    }

    @keyframes ske {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    .thumb-icon {
      width: 30px;
      height: 30px;
      opacity: 0.42;
      position: relative;
      z-index: 1;
      color: var(--fg-3);
    }
    .thumb-icon svg { width: 100%; height: 100%; }

    /* type badge (PNG / SVG / MP3 …) — floats over the thumbnail corner */
    .badge {
      position: absolute;
      top: 6px;
      inset-inline-start: 6px;
      z-index: 2;
      padding: 2px 6px;
      font-size: 9.5px;
      font-weight: 600;
      letter-spacing: 0.4px;
      color: #fff;
      background: rgba(15, 23, 42, 0.62);
      border-radius: 6px;
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      pointer-events: none;
    }

    /* "add to slide" affordance that fades in on hover */
    .add-cue {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0, 120, 212, 0.16);
      opacity: 0;
      transition: opacity var(--t);
    }
    .add-cue svg { width: 26px; height: 26px; color: #fff; filter: drop-shadow(0 1px 3px rgba(0,0,0,.35)); }
    .card:hover .add-cue { opacity: 1; }

    /* Card info */
    .info {
      padding: 6px 8px 7px;
      border-top: 1px solid var(--bg);
    }

    .name {
      font-size: 11.5px;
      font-weight: 500;
      color: var(--fg);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    /* ── Loading / empty states ──────────────────────── */
    .spin-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 48px 0;
      color: var(--fg-2);
      font-size: 12.5px;
    }

    .spin {
      width: 24px;
      height: 24px;
      border: 2.5px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    .empty {
      text-align: center;
      padding: 32px 16px;
      color: var(--fg-2);
      font-size: 12.5px;
      line-height: 1.75;
    }

    .empty .big { font-size: 26px; display: block; margin-bottom: 8px; }

    .retry-btn {
      display: inline-block;
      margin-top: 12px;
      padding: 6px 16px;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 6px;
      font: inherit;
      font-size: 12.5px;
      font-weight: 500;
      cursor: pointer;
      transition: background var(--t);
    }

    .retry-btn:hover { background: var(--primary-dark); }
    .retry-btn:focus-visible { outline: 2px solid var(--primary); outline-offset: 2px; }

    /* ── Reduced motion ──────────────────────────────── */
    @media (prefers-reduced-motion: reduce) {
      .card, .tab, .retry-btn, .search-wrap, .thumb img {
        transition: none !important;
      }
      .card:hover .thumb img.vis { transform: none !important; }
      .card.ins, .spin, .ske, .grid { animation: none !important; }
    }
  </style>
</head>
<body>

<div class="hdr">
  <h1>
    <svg width="17" height="17" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
      <rect x="3" y="3" width="7" height="7" rx="1.5"/><rect x="14" y="3" width="7" height="7" rx="1.5"/>
      <rect x="3" y="14" width="7" height="7" rx="1.5"/><rect x="14" y="14" width="7" height="7" rx="1.5"/>
    </svg>
    ספריית נכסים
  </h1>
  <div class="search-wrap" role="search">
    <span class="search-icon" aria-hidden="true">
      <svg width="13" height="13" viewBox="0 0 16 16" fill="none" xmlns="http://www.w3.org/2000/svg">
        <circle cx="6.5" cy="6.5" r="5" stroke="white" stroke-width="1.6"/>
        <line x1="10.3" y1="10.3" x2="14.5" y2="14.5" stroke="white" stroke-width="1.6" stroke-linecap="round"/>
      </svg>
    </span>
    <input id="q" type="text" placeholder="חפש נכסים..." autocomplete="off" spellcheck="false" aria-label="חיפוש נכסים">
  </div>
  <div class="count" id="cnt"></div>
  <div class="hint">גרור או לחץ על נכס כדי להוסיפו לשקף באיכות מלאה</div>
</div>

<div class="tabs" id="tabs" role="tablist" aria-label="קטגוריות נכסים"></div>
<div id="st" role="status" aria-live="polite" aria-atomic="true"></div>
<div id="body" aria-label="רשימת נכסים">
  <div class="spin-wrap">
    <div class="spin"></div>
    <span>טוען נכסים...</span>
  </div>
</div>

<script>
// ─── Config ───────────────────────────────────────────────────────────────────
const ROOT_FOLDER_ID = "1kuLZ5Ayvn6Fdl7CK7o0qJWVQVumtE3VE";
const GOOGLE_API_KEY = "%%GOOGLE_API_KEY%%";
const DRIVE_API      = "https://www.googleapis.com/drive/v3/files";

// ⚠️ QUALITY-CRITICAL: full-quality download endpoint. Must be `alt=media`.
// NEVER use `drive.google.com/uc?export=download` — it returns a compressed/resized
// copy → pixelated inserts. This is the single source of truth for the insert URL.
function fileDownloadUrl(id) {
  return `${DRIVE_API}/${id}?alt=media&key=${GOOGLE_API_KEY}`;
}

// ─── Folder → category mapping ────────────────────────────────────────────────
const FOLDER_META = {
  "מוקאפים":    { icon: "🖥️", label: "מוקאפים" },
  "רקעים":      { icon: "🎨", label: "רקעים"    },
  "אייקונים":   { icon: "⭐", label: "אייקונים"  },
  "סאונד":      { icon: "🔊", label: "סאונד"     },
  "לוגואים":    { icon: "✏️", label: "לוגואים"   },
  "וידאו":      { icon: "🎬", label: "וידאו"     },
  "mockups":    { icon: "🖥️", label: "מוקאפים"  },
  "backgrounds":{ icon: "🎨", label: "רקעים"    },
  "icons":      { icon: "⭐", label: "אייקונים"  },
  "sound":      { icon: "🔊", label: "סאונד"     },
};

const IMAGE_EXT = /\.(jpe?g|png|gif|webp|svg|bmp|tiff?)$/i;
const AUDIO_EXT = /\.(mp3|wav|aac|ogg|m4a|flac)$/i;

function assetType(name, mime) {
  if (IMAGE_EXT.test(name) || mime.startsWith("image/")) return "image";
  if (AUDIO_EXT.test(name) || mime.startsWith("audio/")) return "audio";
  return "file";
}

function driveUrl(params) {
  return `${DRIVE_API}?${new URLSearchParams({ ...params, key: GOOGLE_API_KEY })}`;
}

async function loadFromDrive() {
  // 1. Get subfolders
  const fRes = await fetch(driveUrl({
    q: `'${ROOT_FOLDER_ID}' in parents and mimeType='application/vnd.google-apps.folder' and trashed=false`,
    fields: "files(id,name)",
    orderBy: "name",
    pageSize: "100",
  }));
  if (!fRes.ok) throw new Error(`שגיאת Drive API: HTTP ${fRes.status}`);
  const { files: folders = [] } = await fRes.json();
  if (!folders.length) throw new Error("לא נמצאו תיקיות ב-Drive. בדוק הרשאות שיתוף.");

  // 2. Get files in each folder (parallel)
  const categories = await Promise.all(folders.map(async folder => {
    const fls = await fetch(driveUrl({
      q: `'${folder.id}' in parents and mimeType!='application/vnd.google-apps.folder' and trashed=false`,
      fields: "files(id,name,mimeType,thumbnailLink)",
      pageSize: "1000",
    }));
    const { files = [] } = await fls.json();

    const meta = FOLDER_META[folder.name]
      || FOLDER_META[folder.name.toLowerCase()]
      || { icon: "📁", label: folder.name };

    return {
      id: folder.id,
      label: meta.label,
      icon: meta.icon,
      assets: files.map(f => ({
        id: f.id,
        name: f.name.replace(/\.[^.]+$/, ""),
        rawName: f.name,
        url: fileDownloadUrl(f.id),
        thumbnail: f.thumbnailLink
          ? f.thumbnailLink.replace(/=s\d+$/, "=s400")
          : `https://drive.google.com/thumbnail?id=${f.id}&sz=w400`,
        type: assetType(f.name, f.mimeType || ""),
        tags: [],
      })),
    };
  }));

  return { categories };
}

// ─── State ────────────────────────────────────────────────────────────────────
let data      = null;
let activeTab = "all";
let query     = "";
let debTimer  = null;
let statusTimer = null;

// ─── DOM refs ─────────────────────────────────────────────────────────────────
const $q    = document.getElementById("q");
const $tabs = document.getElementById("tabs");
const $st   = document.getElementById("st");
const $body = document.getElementById("body");
const $cnt  = document.getElementById("cnt");

// ─── Office bootstrap ─────────────────────────────────────────────────────────
Office.onReady(() => {
  load();

  $q.addEventListener("input", () => {
    clearTimeout(debTimer);
    debTimer = setTimeout(() => {
      query = $q.value;
      renderGrid();
    }, 300);
  });
});

// ─── Load assets ──────────────────────────────────────────────────────────────
async function load() {
  const cached = sessionStorage.getItem("am_cache_v4");
  if (cached) {
    try { data = JSON.parse(cached); renderAll(); return; } catch (_) {}
  }

  setBody(`<div class="spin-wrap"><div class="spin"></div><span>טוען נכסים מ-Drive...</span></div>`);

  try {
    data = await loadFromDrive();
    sessionStorage.setItem("am_cache_v4", JSON.stringify(data));
    renderAll();
  } catch (e) {
    $tabs.innerHTML = "";
    $cnt.textContent = "";
    setBody(`<div class="empty">
      <span class="big">⚠️</span>
      לא ניתן לטעון את הנכסים.<br>${esc(e.message || "בדוק את החיבור לאינטרנט.")}
      <br><button type="button" class="retry-btn" onclick="load()">נסה שוב</button>
    </div>`);
  }
}

// ─── Render ───────────────────────────────────────────────────────────────────
function renderAll() {
  renderTabs();
  renderGrid();
}

function renderTabs() {
  $tabs.innerHTML = "";
  appendTab("all", "הכל");
  for (const cat of (data.categories || [])) {
    appendTab(cat.id, `${cat.icon} ${cat.label}`);
  }
}

function appendTab(id, label) {
  const el = document.createElement("div");
  el.className = "tab" + (id === activeTab ? " on" : "");
  el.textContent = label;
  el.setAttribute("role", "tab");
  el.setAttribute("tabindex", id === activeTab ? "0" : "-1");
  el.setAttribute("aria-selected", id === activeTab ? "true" : "false");

  const activate = () => {
    activeTab = id;
    query = "";
    $q.value = "";
    document.querySelectorAll(".tab").forEach(t => {
      t.classList.remove("on");
      t.setAttribute("aria-selected", "false");
      t.setAttribute("tabindex", "-1");
    });
    el.classList.add("on");
    el.setAttribute("aria-selected", "true");
    el.setAttribute("tabindex", "0");
    hideStatus();
    renderGrid();
  };

  el.addEventListener("click", activate);
  el.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); activate(); } });
  $tabs.appendChild(el);
}

function getFiltered() {
  const q = query.trim().toLowerCase();
  const out = [];

  for (const cat of (data.categories || [])) {
    if (activeTab !== "all" && cat.id !== activeTab) continue;
    for (const asset of (cat.assets || [])) {
      if (q) {
        const hay = [asset.name, ...(asset.tags || []), cat.label].join(" ").toLowerCase();
        if (!hay.includes(q)) continue;
      }
      out.push({ ...asset, _catId: cat.id });
    }
  }
  return out;
}

function renderGrid() {
  hideStatus();
  const list = getFiltered();
  const total = (data.categories || []).reduce((s, c) => s + (c.assets || []).length, 0);

  $cnt.textContent = (query || activeTab !== "all")
    ? `נמצאו ${list.length} נכסים`
    : `${total} נכסים`;

  if (list.length === 0) {
    setBody(`<div class="empty">
      <span class="big">🔍</span>
      ${query
        ? `לא נמצאו נכסים עבור "<strong>${esc(query)}</strong>"`
        : "אין נכסים בקטגוריה זו"}
    </div>`);
    return;
  }

  const grid = document.createElement("div");
  grid.className = "grid";
  for (const asset of list) grid.appendChild(makeCard(asset));

  $body.innerHTML = "";
  $body.appendChild(grid);
}

// ─── SVG icons (Lucide-style, no emoji) ─────────────────────────────────────────
const ICONS = {
  audio: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`,
  image: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.1-3.1a2 2 0 0 0-2.8 0L6 21"/></svg>`,
  add:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>`,
};

// ─── Card ──────────────────────────────────────────────────────────────────────
function makeCard(asset) {
  const isAudio = asset.type === "audio";

  const card  = document.createElement("div");
  card.className = "card";

  // ⚠️ QUALITY-CRITICAL: DRAG = PRESS.
  // Native drag-and-drop into the slide is unreliable in the Office WebView and only ever
  // transfers the low-res thumbnail. So a drag gesture just triggers the same full-quality
  // insert as a click (cancel the native drag, then insertAsset). One reliable code path.
  card.draggable = true;
  card.addEventListener("dragstart", e => {
    e.preventDefault();        // stop the lossy native drag
    insertAsset(asset, card);  // …and insert exactly like a press
  });

  // Thumbnail
  const thumb = document.createElement("div");
  thumb.className = "thumb";

  if (isAudio) {
    const ico = document.createElement("span");
    ico.className = "thumb-icon";
    ico.innerHTML = ICONS.audio;
    thumb.appendChild(ico);
  } else {
    const ske = document.createElement("div");
    ske.className = "ske";

    const img = document.createElement("img");
    img.alt = "";
    img.draggable = false;
    img.src = asset.thumbnail || asset.url;
    img.onload  = () => { img.classList.add("vis"); ske.remove(); };
    img.onerror = () => {
      ske.remove();
      const ico = document.createElement("span");
      ico.className = "thumb-icon";
      ico.innerHTML = ICONS.image;
      thumb.insertBefore(ico, thumb.firstChild);
    };

    thumb.appendChild(ske);
    thumb.appendChild(img);
  }

  // Type badge (PNG / SVG / MP3 …)
  const badge = document.createElement("span");
  badge.className = "badge";
  badge.textContent = getExtFromName(asset.rawName || "");
  thumb.appendChild(badge);

  // Hover "add to slide" cue
  const cue = document.createElement("span");
  cue.className = "add-cue";
  cue.setAttribute("aria-hidden", "true");
  cue.innerHTML = ICONS.add;
  thumb.appendChild(cue);

  // Info
  const info = document.createElement("div");
  info.className = "info";

  const name = document.createElement("div");
  name.className = "name";
  name.title     = asset.name;
  name.textContent = asset.name;

  info.appendChild(name);

  card.setAttribute("role", "button");
  card.setAttribute("tabindex", "0");
  card.setAttribute("aria-label", asset.name);

  card.appendChild(thumb);
  card.appendChild(info);
  card.addEventListener("click", () => insertAsset(asset, card));
  card.addEventListener("keydown", e => { if (e.key === "Enter" || e.key === " ") { e.preventDefault(); insertAsset(asset, card); } });
  return card;
}

// ─── Insert ────────────────────────────────────────────────────────────────────
let inserting = false;  // guard: a drag gesture + click must not double-insert

async function insertAsset(asset, card) {
  if (inserting) return;
  inserting = true;
  try {
    await doInsert(asset, card);
  } finally {
    inserting = false;
  }
}

async function doInsert(asset, card) {
  if (asset.type === "audio") {
    await insertAudio(asset, card);
    return;
  }

  showStatus("⏳ מכניס לשקף...", "inf", false);

  try {
    const r = await fetch(asset.url, { mode: "cors" });
    if (!r.ok) throw new Error(`לא ניתן להוריד את הקובץ (HTTP ${r.status})`);
    const blob = await r.blob();

    const isSvg = /\.svg$/i.test(asset.rawName || asset.name) || blob.type === "image/svg+xml";
    const dims  = isSvg ? await getSvgDims(blob) : await getImgDims(URL.createObjectURL(blob));
    const b64   = await blobToBase64(blob);

    await insertImageOnSlide(b64, dims);

    card.classList.add("ins");
    setTimeout(() => card.classList.remove("ins"), 550);
    showStatus(`✅ "${asset.name}" הוכנס לשקף`, "ok");

  } catch (e) {
    let msg = e.message || "שגיאה לא ידועה";
    if (typeof OfficeExtension !== "undefined" && e instanceof OfficeExtension.Error) {
      msg = `שגיאת Office (${e.code}): ${e.debugInfo ? e.debugInfo.message : ""}`;
    }
    showStatus(`❌ ${msg}`, "err");
  }
}

// Active slide = selected slide (API 1.5+) or first slide. Caller must load() shapes.
async function getActiveSlide(ctx) {
  try {
    const sel = ctx.presentation.getSelectedSlides();
    sel.load("items"); await ctx.sync();
    if (sel.items.length) return sel.items[0];
  } catch (_) { /* getSelectedSlides needs API 1.5 — fall through */ }

  const slides = ctx.presentation.slides;
  slides.load("items"); await ctx.sync();
  if (!slides.items.length) throw new Error("אין שקפים במצגת");
  return slides.items[0];
}

async function insertImageOnSlide(b64, dims) {
  const SLIDE_W = 720, SLIDE_H = 540;
  const imgW = Math.round(SLIDE_W * 0.4);
  const imgH = Math.round(imgW * (dims.h / dims.w));
  const left = Math.round((SLIDE_W - imgW) / 2);
  const top  = Math.round((SLIDE_H - imgH) / 2);

  let useFallback = false;

  try {
    await PowerPoint.run(async ctx => {
      const slide = await getActiveSlide(ctx);
      // ⚠️ QUALITY-CRITICAL: addImage takes pure base64 of the full-res file → native
      // quality (and native SVG vector). Only fall back when it's truly unavailable.
      if (typeof slide.shapes.addImage !== "function") { useFallback = true; return; }

      const shape = slide.shapes.addImage(b64);
      shape.width = imgW; shape.height = imgH;
      shape.left  = left; shape.top    = top;
      await ctx.sync();
    });
  } catch (e) {
    const m = e.message || "";
    if (m.includes("addImage") || m.includes("not a function")) useFallback = true;
    else throw e;
  }

  if (!useFallback) return;

  // Fallback: setSelectedDataAsync (API 1.1+, broadly compatible)
  await new Promise((res, rej) => {
    Office.context.document.setSelectedDataAsync(b64, {
      coercionType: Office.CoercionType.Image,
      imageLeft: left, imageTop: top,
      imageWidth: imgW, imageHeight: imgH,
    }, r => r.status === Office.AsyncResultStatus.Failed
      ? rej(new Error(r.error.message || "שגיאה בהכנסת תמונה"))
      : res());
  });
}

async function insertAudio(asset, card) {
  showStatus("⏳ מכניס סאונד...", "inf", false);
  let apiAvailable = false;
  try {
    await PowerPoint.run(async ctx => {
      const slide = await getActiveSlide(ctx);
      if (typeof slide.shapes.addAudioFromBase64 !== "function") return;

      const r = await fetch(asset.url, { mode: "cors" });
      if (!r.ok) throw new Error(`לא ניתן להוריד (HTTP ${r.status})`);
      const b64 = await blobToBase64(await r.blob());

      slide.shapes.addAudioFromBase64(b64, { isLooping: false, isPlaying: false });
      await ctx.sync();
      apiAvailable = true;
    });
  } catch (e) {
    showStatus(`❌ ${e.message || "שגיאת סאונד"}`, "err");
    return;
  }

  if (apiAvailable) {
    card.classList.add("ins");
    setTimeout(() => card.classList.remove("ins"), 550);
    showStatus(`✅ "${asset.name}" הוכנס לשקף`, "ok");
  } else {
    try { Office.context.ui.openBrowserWindow(asset.url); } catch (_) { window.open(asset.url, "_blank"); }
    showStatus("⬇️ שמור את הקובץ והכנס ידנית: הוספה ← שמע ← שמע במחשב שלי", "inf");
  }
}

async function getSvgDims(blob) {
  try {
    const text = await blob.text();
    const w = parseFloat(text.match(/\bwidth="([\d.]+)/)?.[1]);
    const h = parseFloat(text.match(/\bheight="([\d.]+)/)?.[1]);
    if (w > 0 && h > 0) return { w, h };
    const vb = text.match(/viewBox="([^"]+)"/)?.[1]?.trim().split(/[\s,]+/);
    if (vb?.length >= 4) return { w: parseFloat(vb[2]), h: parseFloat(vb[3]) };
  } catch (_) {}
  return { w: 1, h: 1 };
}

// ─── Helpers ──────────────────────────────────────────────────────────────────
function getImgDims(src) {
  return new Promise(res => {
    const i = new Image();
    i.onload  = () => { res({ w: i.naturalWidth,  h: i.naturalHeight }); URL.revokeObjectURL(src); };
    i.onerror = () => { res({ w: 4, h: 3 });                             URL.revokeObjectURL(src); };
    i.src = src;
  });
}

function blobToBase64(blob) {
  return new Promise((res, rej) => {
    const fr = new FileReader();
    fr.onload  = () => res(fr.result.split(",")[1]);
    fr.onerror = rej;
    fr.readAsDataURL(blob);
  });
}

function getExtFromName(name) {
  const m = name.match(/\.([a-z0-9]{2,5})$/i);
  return m ? m[1].toUpperCase() : "—";
}

function setBody(html) { $body.innerHTML = html; }

function showStatus(msg, type, autoHide = true) {
  clearTimeout(statusTimer);
  $st.className = type;
  $st.textContent = msg;
  if (autoHide) statusTimer = setTimeout(hideStatus, 4500);
}

function hideStatus() {
  clearTimeout(statusTimer);
  $st.className = "";
}

function esc(s) {
  return String(s)
    .replace(/&/g, "&amp;").replace(/</g, "&lt;")
    .replace(/>/g, "&gt;").replace(/"/g, "&quot;");
}
</script>
</body>
